<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>GitHub Explorer Pro + Debug</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* SIDEBAR */
#sidebar {
    width: 320px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-right: 1px solid rgba(255,255,255,0.1);
    padding: 15px;
    overflow-y: auto;
}

/* MAIN */
#main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* HEADER */
header {
    padding: 15px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    font-weight: 600;
}

/* FILES */
.file {
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    gap: 8px;
}

.file:hover {
    background: rgba(255,255,255,0.1);
    transform: translateX(5px);
}

.folder { color: #facc15; }
.fileicon { color: #38bdf8; }

/* VIEWER */
iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: white;
    transition: opacity 0.2s;
}

/* DEBUG CONSOLE */
#debug {
    height: 160px;
    background: #020617;
    border-top: 1px solid rgba(255,255,255,0.1);
    font-size: 12px;
    overflow-y: auto;
    padding: 8px;
    color: #a5b4fc;
}

.log { color: #93c5fd; }
.error { color: #fb7185; }
.warn { color: #facc15; }

</style>
</head>

<body>

<div id="sidebar">
    <h3>📁 Explorer</h3>
    <div id="path">/</div>
    <div id="list"></div>
</div>

<div id="main">
    <header>👁 Vorschau</header>
    <iframe id="viewer"></iframe>
    <div id="debug"></div>
</div>

<script>

const user = "DEIN_USERNAME";
const repo = "DEIN_REPO";

function log(msg, type = "log") {
    const debug = document.getElementById("debug");
    const div = document.createElement("div");
    div.className = type;
    div.textContent = `[${type.toUpperCase()}] ${msg}`;
    debug.appendChild(div);
    debug.scrollTop = debug.scrollHeight;
    console.log(msg);
}

async function load(path = "") {
    try {
        log(`Lade Pfad: ${path || "/"}`);

        const list = document.getElementById("list");
        list.innerHTML = "Lade...";

        const url = `https://api.github.com/repos/${user}/${repo}/contents/${path}`;
        log(`API Request: ${url}`);

        const res = await fetch(url);

        log(`Status: ${res.status}`);

        const data = await res.json();

        log(`Antwort erhalten`);

        if (!Array.isArray(data)) {
            log(`API Fehler: ${JSON.stringify(data)}`, "error");
            list.innerHTML = "❌ Fehler (siehe Debug)";
            return;
        }

        document.getElementById("path").innerText = "/" + path;

        list.innerHTML = "";

        if (path !== "") {
            const back = document.createElement("div");
            back.className = "file";
            back.innerHTML = "⬅️ ..";
            back.onclick = () => {
                const parts = path.split("/");
                parts.pop();
                load(parts.join("/"));
            };
            list.appendChild(back);
        }

        data.forEach(item => {
            const div = document.createElement("div");
            div.className = "file";

            if (item.type === "dir") {
                div.innerHTML = `<span class="folder">📁</span> ${item.name}`;
                div.onclick = () => load(item.path);
            } else {
                div.innerHTML = `<span class="fileicon">📄</span> ${item.name}`;
                div.onclick = () => openFile(item.download_url);
            }

            list.appendChild(div);
        });

        log(`Dateien geladen: ${data.length}`);

    } catch (err) {
        log(`Exception: ${err.message}`, "error");
        console.error(err);
    }
}

function openFile(url) {
    try {
        log(`Öffne Datei: ${url}`);

        const viewer = document.getElementById("viewer");
        viewer.style.opacity = 0;

        setTimeout(() => {
            viewer.src = url;
            viewer.style.opacity = 1;
        }, 150);

    } catch (err) {
        log(`Fehler beim Öffnen: ${err.message}`, "error");
    }
}

load("");

</script>

</body>
</html>
